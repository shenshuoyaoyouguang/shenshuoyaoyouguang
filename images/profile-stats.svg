<svg xmlns="http://www.w3.org/2000/svg" width="495" height="220" viewBox="0 0 495 220" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Overview</title>
  <desc id="desc">Profile statistics are being generated by GitHub Actions.</desc>
  <rect width="495" height="220" rx="12" fill="#0d1117"/>
  <rect x="1" y="1" width="493" height="218" rx="11" fill="none" stroke="#30363d"/>
  <text x="28" y="46" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">GitHub Overview</text>
  <text x="28" y="96" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="16">正在由 GitHub Actions 生成最新统计数据…</text>
  <text x="28" y="128" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="16">首次生成通常需要 1-3 分钟。</text>
  <circle cx="36" cy="174" r="8" fill="#58a6ff"/>
  <text x="56" y="180" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="14">稳定来源：仓库内静态 SVG</text>
</svg>
