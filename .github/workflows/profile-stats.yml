name: Generate Profile Stats

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate overview stats card
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/profile-stats.svg
          custom-title: GitHub Overview
          colors: dark-dimmed
          hide-keys: languages
          commit-and-push: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/top-languages.svg
          custom-title: Top Languages
          colors: dark-dimmed
          category-order: languages
          max-languages: 8
          commit-and-push: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- images/profile-stats.svg images/top-languages.svg; then
            echo "No image updates to commit."
            exit 0
          fi
          git add images/profile-stats.svg images/top-languages.svg
          git commit -m "chore: refresh profile stats"
          git push
