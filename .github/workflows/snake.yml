name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: shenshuoyaoyouguang
          outputs: |
            dist/github-contribution-grid-snake.svg?color-snake=#00FFFF&color-dots=#FF00FF,#00FF00,#00FFFF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color-snake=#00FFFF

      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}